name: AI Dev Pipeline

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Natural language dev command"
        required: true

jobs:
  codex-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: ${{ github.event.inputs.command }}
