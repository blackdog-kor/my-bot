name: Stability Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: stability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/userbot_sender.py
          python -m py_compile app/pg_broadcast.py
          python -m py_compile app/scheduler.py
          python -m py_compile bot/subscribe_bot.py
          echo "✅ Syntax OK"
