name: Auto-deploy Copilot PRs

# Stability Check가 완료되면 실행 → copilot/* 브랜치 PR이 통과하면 자동 머지
# 머지 후 Railway가 main 브랜치 변경을 감지하여 자동 배포

on:
  workflow_run:
    workflows: ["Stability Check"]
    types: [completed]

jobs:
  auto-merge:
    # CI 성공 + PR 이벤트 + copilot/* 브랜치인 경우만 실행
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'copilot/')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find and merge Copilot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "🔍 Looking for open PR from branch: $HEAD_BRANCH"

          PR_NUMBER=$(gh pr list \
            --repo "$GH_REPO" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "⚠️ No open PR found for branch $HEAD_BRANCH — skipping"
            exit 0
          fi

          echo "✅ Found PR #$PR_NUMBER — merging into main"

          gh pr merge "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --squash \
            --admin \
            --subject "Auto-merge Copilot PR #$PR_NUMBER" \
            --body "Automatically merged after Stability Check passed. Railway will auto-deploy."

          echo "🚀 Merged! Railway auto-deploy triggered."
